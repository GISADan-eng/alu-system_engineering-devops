<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Ceci n'est pas une page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container { padding: 2rem; }
        h1 { font-size: 8rem; color: #e94560; text-shadow: 0 0 20px #e94560; }
        h2 { font-size: 2rem; margin: 1rem 0; color: #0f3460; background: #e94560; padding: 0.5rem 1rem; }
        p { font-size: 1.2rem; margin: 1rem 0; color: #a8a8b3; }
        a { color: #e94560; text-decoration: none; font-size: 1.1rem; border: 1px solid #e94560; padding: 0.5rem 1.5rem; border-radius: 4px; }
        a:hover { background: #e94560; color: white; }
        .pipe { font-size: 5rem; margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <div class="pipe">🚫</div>
        <h2>Ceci n'est pas une page</h2>
        <p>The page you are looking for does not exist.</p>
        <p>Like Magritte's pipe - this is not a page.</p>
        <br>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
